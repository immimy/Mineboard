workflow:
  rules:
    # Preventing pipeline from MR
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    # Allow branch and schedule pipeline
    - if: '$CI_COMMIT_BRANCH'

stages:
  - build
  - test
  - deploy_preview
  - deploy_prod

# ----- BUILD DOCKER IMAGE -------------------------
# Only run on schedule pipeline

build_docker_image:
  stage: .pre
  image: docker:27
  services:
    - docker:27-dind
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  script:
    - docker version
    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE/vercel -f ci/Dockerfile .
    - docker image ls
    - docker push $CI_REGISTRY_IMAGE/vercel

# ----- BUILD -------------------------

build_preview:
  stage: build
  image: $CI_REGISTRY_IMAGE/vercel
  rules:
    - if: '$CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH'
  script:
    - node --version
    - npm --version
    - vercel --version
    - vercel pull --yes --environment=preview --token $VERCEL_TOKEN
    - vercel build --token $VERCEL_TOKEN
  artifacts:
    untracked: true
    paths:
      - .vercel/output/
      - node_modules/

build_prod:
  stage: build
  image: $CI_REGISTRY_IMAGE/vercel
  rules:
    - if: '$CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH'
  script:
    - node --version
    - npm --version
    - vercel --version
    - vercel pull --yes --environment=production --token $VERCEL_TOKEN
    - vercel build --prod --token $VERCEL_TOKEN
  artifacts:
    untracked: true
    paths:
      - .vercel/output/
      - node_modules/

# ----- TEST -------------------------

unit_tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.58.2-noble
  script:
    - npm ci
    - npm test
  artifacts:
    when: always
    reports:
      junit: reports/junit-report.xml

# ----- DEPLOY -------------------------

deploy_preview:
  stage: deploy_preview
  image: $CI_REGISTRY_IMAGE/vercel
  rules:
    - if: '$CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH'
  environment:
    name: preview/$CI_COMMIT_REF_SLUG
    url: $PREVIEW_URL
  script:
    - vercel --version
    - PREVIEW_URL=$(vercel deploy --prebuilt --archive=tgz --token $VERCEL_TOKEN)
    - echo "PREVIEW_URL=$PREVIEW_URL" > deploy.env
    - cat deploy.env
    # Provide a bypass token to access the protected deployments (Preview environment)
    # Only matches HTML elements containing "Mineboard"
    - curl "$PREVIEW_URL/api/webhook?x-vercel-protection-bypass=$VERCEL_AUTOMATION_BYPASS_SECRET" | grep -oE '<[a-z][a-zA-Z0-9]*[^>]*>[^<]*Mineboard[^<]*</[a-z][a-zA-Z0-9]*>'
  artifacts:
    reports:
      dotenv: deploy.env

deploy_prod:
  stage: deploy_prod
  image: $CI_REGISTRY_IMAGE/vercel
  rules:
    - if: '$CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH'
  environment: production
  script:
    - vercel --version
    - PRODUCTION_URL=$(vercel deploy --prebuilt --archive=tgz --prod --token $VERCEL_TOKEN)
    - echo $PRODUCTION_URL
    # Provide a bypass token to access the protected deployments (Production environment)
    # Only matches HTML elements containing "Mineboard"
    - curl "$PRODUCTION_URL/api/webhook?x-vercel-protection-bypass=$VERCEL_AUTOMATION_BYPASS_SECRET" | grep -oE '<[a-z][a-zA-Z0-9]*[^>]*>[^<]*Mineboard[^<]*</[a-z][a-zA-Z0-9]*>'
